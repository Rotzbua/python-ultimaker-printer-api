# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "quarterly"
      timezone: "Europe/Berlin"
      day: "monday"
      time: "05:00"
    groups:
      gh-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "quarterly"
      timezone: "Europe/Berlin"
      day: "monday"
      time: "05:00"
    groups:
      pip-dependencies:
        patterns:
          - "*"
